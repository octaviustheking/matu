<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>matu editor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="hierarchy" class="sidebar panel">
        <div class="panel-header">
            <h1>Hierarchy</h1>
            <button id="add-hierarchy" class="add-button">+</button>
        </div>
        <div id="hierarchy-dropdown-content" class="dropdown">
            <button>Group</button>
            <button>Object</button>
            <button>Sprite</button>
            <button>Audio</button>
            <button>Script</button>
        </div>
        <div id="hierarchy-content"></div>
    </div>

    <div id="center">

        <div id="toolbar" class="panel">
            <button id="run-button" class="play-button">Run</button>
            <button id="stop-button" class="play-button">Stop</button>
            <span id="runtime-status"></span>
        </div>

        <div id="viewport" class="panel">
            <canvas id="matu-canvas"></canvas>
        </div>

        <div id="assets" class="panel">
            <div class="panel-header">
                <h1>Assets</h1>
                <button id="add-assets" class="add-button">+</button>
            </div>
            <input type="file" id="asset-input" multiple>
            <div id="asset-list"></div>
        </div>

    </div>

    <div id="right" class="sidebar">
        <div id="inspector" class="panel">
            <div id="inspector-header" class="panel-header">
                <h1>Inspector</h1>
                <button id="close-inspector" class="close-button">x</button>
            </div>

            <div id="inspector-content">
                <div id="asset-select">
                    <img id="inspector-thumb">
                    <div id="inspector-filename"></div>
                    <div id="inspector-extension"></div>
                    <input id="inspector-rename" type="text">

                    <button id="inspector-save">Save</button>
                </div>

                <div id="node-select">
                    <div id="node-type-label"></div>

                    <label for="node-name">Name</label>
                    <input id="node-name" type="text">

                    <div id="node-object-fields" class="node-field-group">
                        <label for="node-x">X</label>
                        <input id="node-x" type="number">
                        <label for="node-y">Y</label>
                        <input id="node-y" type="number">
                        <label for="node-width">Width</label>
                        <input id="node-width" type="number">
                        <label for="node-height">Height</label>
                        <input id="node-height" type="number">

                        <div>
                            <label class="checkbox-label">Lock dimensions <input id="dimensions-lock" type="checkbox"></label>
                        </div>

                        <div>
                            <label class="checkbox-label">Keep proportions <input id="proportion-lock" type="checkbox"></label>
                        </div>

                        <label for="node-rotation">Rotation</label>
                        <input id="node-rotation" type="number">

                        <label for="node-object-sprite">Sprite</label>
                        <select id="node-object-sprite"></select>
                    </div>

                    <div id="node-sprite-fields" class="node-field-group">
                        <label for="node-sprite-asset">Image asset</label>

                        <div id="node-appearance">
                            <select id="node-sprite-asset"></select>
                            <label class="checkbox-label">Visible <input id="node-sprite-visible" type="checkbox"></label>
                        </div>

                        <div class="opacity-slider">
                            <label for="node-sprite-opacity">Opacity</label>
                            <input id="node-sprite-opacity" type="range" min="0" max="1" step="0.01">
                            <input id="node-sprite-opacity-value" type="number" min="0" max="100" step="1" value="100">
                        </div>
                    </div>

                    <div id="node-audio-fields" class="node-field-group">
                        <label for="node-audio-asset">Audio asset</label>
                        <select id="node-audio-asset"></select>
                        <label for="node-audio-volume">Volume</label>
                        <input id="node-audio-volume" type="range" min="0" max="1" step="0.01">
                        <label class="checkbox-label"><input id="node-audio-loop" type="checkbox"> Loop</label>
                    </div>

                    <div id="node-script-fields" class="node-field-group">
                        <label for="node-script-code">Code</label>
                        <textarea id="node-script-code" rows="8" spellcheck="false"></textarea>
                        <div id="node-script-error"></div>
                    </div>

                    <button id="node-delete">Delete Node</button>
                </div>
            </div>
        </div>

        <div id="console" class="panel">
            <div class="panel-header">
                <h1>Console</h1>
                <button id="clear-console" class="add-button" title="Clear console">=</button>
            </div>
            <div id="console-content"></div>
        </div>
    </div>

    <script src="hierarchy.js"></script>
    <script src="runtime.js"></script>
    <script src="script.js"></script>
</body>
</html>
